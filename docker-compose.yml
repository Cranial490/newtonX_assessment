services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DJANGO_DEBUG: "True"
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  backend_data:
